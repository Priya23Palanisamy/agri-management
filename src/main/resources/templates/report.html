<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Dashboard - Reports</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        h2 { color: #2c3e50; }
        .report-filters, .report-summary { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);}
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { margin-top: 5px; padding: 5px 10px; width: 200px; }
        button { cursor: pointer; margin-right: 10px; background: #4CAF50; color: #fff; border: none; border-radius: 4px; }
        button:hover { opacity: 0.9; }
        #reportChart { max-width: 600px; margin-top: 20px; }
        .summary-item { margin: 5px 0; }
    </style>
</head>
<body>

<h2>📊 Reports</h2>

<!-- FILTER SECTION -->
<div class="report-filters">
    <label>Report Type:</label>
    <select id="reportType">
        <option value="stock">Stock Report</option>
        <option value="transaction">Transaction Report</option>
        <option value="revenue">Revenue Report</option>
    </select>

    <label>Category (optional):</label>
    <input type="text" id="category" placeholder="e.g. Vegetables">

    <label>Start Date:</label>
    <input type="date" id="startDate">

    <label>End Date:</label>
    <input type="date" id="endDate">

    <div style="margin-top: 15px;">
        <button onclick="generateReport()">📊 Generate Report</button>
        <button onclick="exportCSV()">⬇️ Export CSV</button>
        <button onclick="exportPDF()">⬇️ Export PDF</button>
    </div>
</div>

<!-- REPORT SUMMARY -->
<div class="report-summary">
    <h3>📊 Report Summary</h3>
    <div class="summary-item">Report: <span id="reportTypeText">-</span></div>
    <div class="summary-item">Generated: <span id="generatedDate">-</span></div>
    <div class="summary-item">📦 Total Stock: <span id="totalStock">-</span></div>
    <div class="summary-item">💰 Stock Value: ₹<span id="stockValue">-</span></div>
    <div class="summary-item">🔄 Transactions: <span id="transactions">-</span></div>
    <div class="summary-item">💵 Revenue: ₹<span id="revenue">-</span></div>
    <div class="summary-item">📈 Fast Moving: <span id="fastMoving">-</span></div>
    <div class="summary-item">📉 Slow Moving: <span id="slowMoving">-</span></div>
    <div class="summary-item">⚠️ Stock Issues: <span id="stockIssues">-</span></div>
    <div class="summary-item">💡 Recommendations: <span id="recommendations">-</span></div>
</div>

<!-- CHART -->
<canvas id="reportChart"></canvas>

<script>
let currentData = null;

async function generateReport() {

    const type = document.getElementById("reportType").value;

    const body = {
        reportType: type,
        category: document.getElementById("category").value || null,
        startDate: document.getElementById("startDate").value || null,
        endDate: document.getElementById("endDate").value || null
    };

    const res = await fetch('/api/reports/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });

    const data = await res.json();

    // HIDE ALL FIRST
    document.getElementById("reportChart").style.display = "none";
    document.getElementById("tableContainer").style.display = "none";

    // 🔹 TRANSACTION → TABLE
    if (type === "TRANSACTION") {
        showTable(data.transactionsList || []);
    }

    // 🔹 ANALYTICS → CHART
    else if (type === "ANALYTICS") {
        showChart(data.barChartData || {});
    }

    // 🔹 STOCK → DEFAULT SUMMARY + CHART
    else {
        showChart(data.barChartData || {});
    }
}

// Display Report
function displayReport(data, reportType) {
    document.getElementById("reportTypeText").innerText = reportType;
    document.getElementById("generatedDate").innerText = new Date().toLocaleDateString();
    document.getElementById("totalStock").innerText = data.totalStock || 0;
    document.getElementById("stockValue").innerText = data.stockValue || 0;
    document.getElementById("transactions").innerText = data.transactions || 0;
    document.getElementById("revenue").innerText = data.revenue || 0;
    document.getElementById("fastMoving").innerText = data.fastMoving || "None";
    document.getElementById("slowMoving").innerText = data.slowMoving || "None";
    document.getElementById("stockIssues").innerText = data.stockIssues || "None";
    document.getElementById("recommendations").innerText = data.recommendations ? data.recommendations.join(", ") : "None";

    // Chart
    const ctx = document.getElementById("reportChart").getContext("2d");
    if (window.reportChartInstance) window.reportChartInstance.destroy();
    window.reportChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ["Total Stock", "Revenue", "Transactions", "Stock Value"],
            datasets: [{
                label: "Report Data",
                data: [data.totalStock || 0, data.revenue || 0, data.transactions || 0, data.stockValue || 0],
                backgroundColor: ["#4CAF50", "#2196F3", "#FF9800", "#9C27B0"]
            }]
        },
        options: { responsive: true }
    });
}

// Export CSV
function exportCSV() {
    if (!currentData) {
        alert("Please generate a report first!");
        return;
    }

    const rows = [
        ["Report Type", document.getElementById("reportTypeText").innerText],
        ["Generated Date", document.getElementById("generatedDate").innerText],
        ["Total Stock", document.getElementById("totalStock").innerText],
        ["Stock Value", document.getElementById("stockValue").innerText],
        ["Transactions", document.getElementById("transactions").innerText],
        ["Revenue", document.getElementById("revenue").innerText],
        ["Fast Moving", document.getElementById("fastMoving").innerText],
        ["Slow Moving", document.getElementById("slowMoving").innerText],
        ["Stock Issues", document.getElementById("stockIssues").innerText],
        ["Recommendations", document.getElementById("recommendations").innerText]
    ];

    let csvContent = rows.map(e => e.join(",")).join("\n");
    const blob = new Blob([csvContent], {type: "text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "report.csv";
    a.click();
    URL.revokeObjectURL(url);
}

// Export PDF
async function exportPDF() {
    if (!currentData) {
        alert("Please generate a report first!");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("📊 Agri Dashboard - Report", 14, 20);

    doc.setFontSize(12);
    doc.text(`Report Type: ${document.getElementById("reportTypeText").innerText}`, 14, 35);
    doc.text(`Generated: ${document.getElementById("generatedDate").innerText}`, 14, 45);

    const summary = [
        ["Total Stock", document.getElementById("totalStock").innerText],
        ["Stock Value", document.getElementById("stockValue").innerText],
        ["Transactions", document.getElementById("transactions").innerText],
        ["Revenue", document.getElementById("revenue").innerText],
        ["Fast Moving", document.getElementById("fastMoving").innerText],
        ["Slow Moving", document.getElementById("slowMoving").innerText],
        ["Stock Issues", document.getElementById("stockIssues").innerText],
        ["Recommendations", document.getElementById("recommendations").innerText]
    ];

    let startY = 60;
    summary.forEach(([key, value], index) => {
        doc.text(`${key}: ${value}`, 14, startY + index * 10);
    });

    // Chart
    const chart = document.getElementById("reportChart");
    if (chart) {
        const canvas = await html2canvas(chart);
        const imgData = canvas.toDataURL("image/png");
        doc.addPage();
        doc.setFontSize(16);
        doc.text("📈 Chart", 14, 20);
        doc.addImage(imgData, "PNG", 15, 30, 180, 100);
    }

    doc.save("report.pdf");
}
</script>

</body>
</html>
