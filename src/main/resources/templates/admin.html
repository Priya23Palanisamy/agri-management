<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{display:flex;height:100vh;background:#020617;color:white;}
.sidebar{width:230px;background:rgba(255,255,255,0.04);padding:20px;}
.main{flex:1;padding:25px;overflow-y:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{padding:18px;border-radius:14px;background:rgba(255,255,255,0.05);}
input,select,button{width:100%;padding:8px;margin-top:6px;border-radius:8px;border:none;}
button{background:#22c55e;color:white;}
.danger{background:#ef4444;}
</style>
</head>

<body>

<div class="sidebar">
<h2>⚙️ Admin</h2>
<a href="#">Dashboard</a>
<a href="#inventory">Inventory</a>
<a href="#alerts">Alerts</a>
<a href="/">Logout</a>
</div>

<div class="main">

<h2>📊 Admin Dashboard</h2>

<h3 id="inventory">📦 Inventory</h3>
<div id="productList" class="grid"></div>

<h3 id="alerts">🔔 Alerts</h3>

<select id="alertFilter" onchange="loadAlerts()">
<option value="">All</option>
<option value="HIGH">High</option>
<option value="MEDIUM">Medium</option>
</select>

<div id="alerts" class="grid"></div>

</div>

<script>

function loadProducts(){
fetch('/products/all')
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<b>${p.name}</b><br>
Qty:${p.quantity}
<input id="in-${p.productId}" placeholder="Add">
<button onclick="stockIn(${p.productId})">Stock In</button>
<input id="out-${p.productId}" placeholder="Remove">
<button onclick="stockOut(${p.productId})">Stock Out</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
});
}

function stockIn(id){
let q=document.getElementById("in-"+id).value;
fetch(`/products/stock-in?productId=${id}&quantity=${q}`,{method:'POST'})
.then(()=>loadProducts());
}

function stockOut(id){
let q=document.getElementById("out-"+id).value;
fetch(`/products/stock-out?productId=${id}&quantity=${q}`,{method:'POST'})
.then(()=>loadProducts());
}

function loadAlerts(){
let severity=document.getElementById("alertFilter").value;
let body={};
if(severity) body.severity=severity;

fetch('/api/alerts/filter',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(body)
})
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(a=>{
let color=a.severity==="HIGH"?"red":"orange";
html+=`
<div class="card" style="border-left:4px solid ${color}">
${a.message}
</div>`;
});
document.getElementById("alerts").innerHTML=html;
});
}

window.onload=function(){
loadProducts();
loadAlerts();
};
</script>

</body>
</html>
