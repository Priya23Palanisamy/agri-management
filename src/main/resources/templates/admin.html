<!DOCTYPE html>
<html>
<head>
    <title>Agri Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- ✅ ONLY ADDED FOR REPORT -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

        body{
            display:flex;
            height:100vh;
            background: linear-gradient(135deg, #1b5e20, #66bb6a);
            color:white;
        }

        .sidebar{
            width:230px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            padding:20px;
        }

        .sidebar h2{
            margin-bottom:20px;
        }

        .sidebar a{
            display:block;
            padding:10px;
            border-radius:8px;
            color:#e8f5e9;
            text-decoration:none;
            margin-bottom:8px;
        }

        .sidebar a:hover{
            background:rgba(255,255,255,0.2);
        }

        .main{
            flex:1;
            padding:25px;
            overflow-y:auto;
        }

        .section{margin-bottom:30px;}

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            padding:18px;
            border-radius:14px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            color:white;
            font-weight:500;
        }

        input,select{
            width:100%;
            padding:8px;
            margin-top:6px;
            border-radius:8px;
            border:none;
        }

        button{
            width:100%;
            padding:8px;
            margin-top:6px;
            border:none;
            border-radius:8px;
            background:#2e7d32;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#1b5e20;
        }

        .danger{background:#c62828;}
        .approve{background:#388e3c;}
        .unlock{background:#1565c0;}

        .empty{text-align:center;color:#eee;}

        /* ✅ ONLY ADDED FOR REPORT VISIBILITY */
        #reportChart{
            background:white;
            border-radius:10px;
            padding:10px;
        }

        table{
            background: rgba(0,0,0,0.5);
            border-collapse: collapse;
        }

        th,td{
            padding:8px;
            border:1px solid #ccc;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🌱 Agri Admin</h2>
    <a href="#">Dashboard</a>
    <a href="#products">🌾 Inventory</a>
    <a href="#requests">👨‍🌾 Farmers</a>
    <a href="#users">👤 Users</a>
    <a href="#alerts">🔔 Alerts</a>
    <a href="/admin-transactions">📋 Transactions</a>

    <!-- ✅ ONLY ADDED -->
    <a href="#reports">📊 Reports</a>

    <a href="/">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <h2>📊 Agri Dashboard</h2>

    <div class="section">
        <h3>🌿 System Overview</h3>
        <div id="stats" class="grid"></div>
    </div>

    <div class="section">
        <h3 id="products">🌾 Inventory</h3>
        <div id="productsList" class="grid"></div>
    </div>

    <div class="section">
        <h3 id="requests">👨‍🌾 Farmer Requests</h3>
        <div id="requestsList" class="grid"></div>
    </div>

    <div class="section">
        <h3 id="users">🔒 Locked Users</h3>
        <div id="lockedUsers" class="grid"></div>
    </div>

    <div class="section">
        <h3 id="alerts">🚨 Alerts</h3>

        <select id="alertFilter" onchange="loadAlerts()">
            <option value="">All</option>
            <option value="HIGH">High</option>
            <option value="MEDIUM">Medium</option>
        </select>

        <div id="alertsContainer" class="grid"></div>
    </div>

    <!-- ✅ REPORT SECTION ONLY -->
    <div class="section">
        <h3 id="reports">📊 Reports</h3>

        <div class="card">
            <select id="reportType">
                <option value="STOCK">Stock</option>
                
                <option value="ANALYTICS">Analytics</option>
            </select>

            <button onclick="generateReport()">Generate Report</button>
            <button onclick="exportCSV()">Export CSV</button>
            <button onclick="exportPDF()">Export PDF</button>
        </div>

        <!-- TABLE -->
        <div id="tableContainer" style="display:none;margin-top:15px;">
            <table id="reportTable" style="width:100%;color:white;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product</th>
                        <th>Type</th>
                        <th>Qty</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- COMPACT CHART -->
        <div style="width:320px;margin:20px auto;">
            <canvas id="reportChart"></canvas>
        </div>

        <!-- RECOMMENDATIONS -->
        <div id="recommendationsBox" class="card" style="display:none;margin-top:15px;"></div>
    </div>

</div>

<script>

    if(localStorage.getItem("role") !== "ADMIN"){
        window.location.href = "/";
    }

    function loadStats(){
        fetch('/admin/stats')
        .then(res=>res.json())
        .then(data=>{
            document.getElementById("stats").innerHTML=`
            <div class="card">👤 Users: ${data.totalUsers}</div>
            <div class="card">👨‍🌾 Farmers: ${data.farmers}</div>
            <div class="card">🛒 Buyers: ${data.buyers}</div>`;
        });
    }

    function loadProducts(){
        fetch('/products/all')
        .then(res=>res.json())
        .then(data=>{
            let html="";
            data.forEach(p=>{
                html+=`
                <div class="card">
                🌾 <b>${p.name}</b><br>
                Qty: ${p.quantity}<br>
                Price: ₹${p.price}

                <input id="in-${p.productId}" placeholder="Add qty">
                <button onclick="stockIn(${p.productId})">Stock In</button>

                <input id="out-${p.productId}" placeholder="Remove qty">
                <button onclick="stockOut(${p.productId})">Stock Out</button>

                <button class="danger" onclick="deleteProduct(${p.productId})">Delete</button>
                </div>`;
            });
            document.getElementById("productsList").innerHTML=html;
        });
    }

    function loadRequests(){
        fetch('/admin/requests')
        .then(res=>res.json())
        .then(data=>{
            let html="";
            if(data.length===0){html="<p class='empty'>No requests</p>";}
            data.forEach(r=>{
                html+=`
                <div class="card">
                👨‍🌾 <b>${r.name}</b><br>${r.email}<br><br>
                <button class="approve" onclick="approve(${r.requestId})">Approve</button>
                <button class="danger" onclick="deleteRequest(${r.requestId})">Reject</button>
                </div>`;
            });
            document.getElementById("requestsList").innerHTML=html;
        });
    }

    function loadLockedUsers(){
        fetch('/admin/locked-users')
        .then(res=>res.json())
        .then(data=>{
            let html="";
            if(data.length===0){html="<p class='empty'>No locked users</p>";}
            data.forEach(u=>{
                html+=`
                <div class="card">
                👤 <b>${u.name}</b><br>${u.email}<br><br>
                <button class="unlock" onclick="unlock(${u.userId})">Unlock</button>
                <button class="danger" onclick="deleteUser(${u.userId})">Delete</button>
                </div>`;
            });
            document.getElementById("lockedUsers").innerHTML=html;
        });
    }

    function loadAlerts(){
        let severity=document.getElementById("alertFilter").value;
        let body={};
        if(severity){body.severity=severity;}

        fetch('/api/alerts/filter',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(body)
        })
        .then(res=>res.json())
        .then(data=>{
            let html="";
            if(data.length===0){html="<p class='empty'>No alerts</p>";}
            data.forEach(a=>{
                let color=a.severity==="HIGH"?"#c62828":"#f9a825";
                html+=`
                <div class="card" style="border-left:5px solid ${color}">
                🚨 <b>${a.severity}</b><br>${a.message}
                </div>`;
            });
            document.getElementById("alertsContainer").innerHTML=html;
        });
    }

    // REPORT LOGIC ONLY
    let chart;

    async function generateReport(){
        const type=document.getElementById("reportType").value;

        const res=await fetch('/api/reports/generate',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({reportType:type})
        });

        const data=await res.json();

        document.getElementById("tableContainer").style.display="none";

        if(type==="TRANSACTION"){
            const tbody=document.querySelector("#reportTable tbody");
            tbody.innerHTML="";
            (data.transactionsList || []).forEach(t=>{
                tbody.innerHTML+=`<tr>
                <td>${t.id}</td>
                <td>${t.productName}</td>
                <td>${t.type}</td>
                <td>${t.quantity}</td>
                <td>${t.date}</td></tr>`;
            });
            document.getElementById("tableContainer").style.display="block";
        }else{
            if(chart) chart.destroy();
            chart=new Chart(document.getElementById("reportChart"),{
                type:type==="ANALYTICS"?"pie":"bar",
                data:{
                    labels:Object.keys(data.barChartData||{}),
                    datasets:[{
                        data:Object.values(data.barChartData||{}),
                        backgroundColor:["#4caf50","#ff9800","#2196f3","#f44336"]
                    }]
                }
            });
        }

        if(data.recommendations){
            document.getElementById("recommendationsBox").style.display="block";
            document.getElementById("recommendationsBox").innerHTML=
            data.recommendations.map(r=>"• "+r).join("<br>");
        }
    }

    function exportCSV(){
        const type = document.getElementById("reportType").value;

        fetch('/api/reports/export/csv', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                reportType: type
            })
        })
        .then(response => response.blob())
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "report.csv";
            document.body.appendChild(a);
            a.click();
            a.remove();
        });
    }

    function exportCSV(){
        const type = document.getElementById("reportType").value;

        fetch('/api/reports/export/csv', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                reportType: type
            })
        })
        .then(response => response.blob())
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "report.csv";
            document.body.appendChild(a);
            a.click();
            a.remove();
        });
    }

    window.onload=function(){
        loadStats();
        loadProducts();
        loadRequests();
        loadLockedUsers();
        loadAlerts();
    };

</script>

</body>
</html>
