<!DOCTYPE html>
<html>
<head>
    <title>Farmer Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            background: linear-gradient(135deg,#1b5e20,#66bb6a);
            color:white;
            font-family:sans-serif;
            padding:20px;
        }

        .form-box{
            max-width:450px;
            margin:auto;
            background:rgba(0,0,0,0.2);
            padding:20px;
            border-radius:12px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:20px;
        }

        .card{
            background:rgba(0,0,0,0.3);
            padding:15px;
            border-radius:10px;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            border-radius:6px;
            border:none;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:8px;
            border:none;
            border-radius:6px;
            background:#2e7d32;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#1b5e20;
        }
    </style>
</head>

<body>

<h2>🌾 Farmer Dashboard</h2>


<!-- ADD PRODUCT -->
<div class="form-box">

    <h3>Add Product</h3>

    <input id="name" placeholder="Product Name">

    <select id="category">
        <option>Vegetables</option>
        <option>Fruits</option>
        <option>Rice</option>
        <option>Grains</option>
        <option>Pulses</option>
        <option>Others</option>
    </select>

    <input id="quantity" type="number" placeholder="Quantity">
    <input id="unit" placeholder="Unit">
    <input id="price" type="number" placeholder="Price">
    <input id="expiry" type="date">
    <input id="minStock" type="number" placeholder="Min Stock Level">

    <button onclick="addProduct()">Add Product</button>

</div>

<h3>📦 My Products</h3>
<div id="products" class="grid"></div>

<script>

    const farmerId = localStorage.getItem("userId");
    console.log("Farmer ID:", farmerId);

    if(!farmerId){
        alert("Please login first");
        window.location.href = "/";
    }

    function addProduct() {

        const userId = localStorage.getItem("userId");

        const name = document.getElementById("name").value.trim();
        const category = document.getElementById("category").value;
        const quantity = document.getElementById("quantity").value;
        const unit = document.getElementById("unit").value;
        const price = document.getElementById("price").value;
        const expiry = document.getElementById("expiry").value;
        const minStock = document.getElementById("minStock").value;

        console.log({ name: name, category: category, quantity: quantity });

        fetch('/products/add?userId=' + userId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                category: category,
                quantity: quantity,
                unit: unit,
                price: price,
                expiryDate: expiry,
                minStockLevel: minStock || 10
            })
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            loadProducts();
        });
    }

    function loadProducts(){

        fetch('/products/farmer?userId=' + farmerId)
        .then(res=>res.json())
        .then(data=>{

            let html="";

            if(data.length === 0){
                html = "<p>No products added yet</p>";
            }

            data.forEach(p=>{
                html+=`
                <div class="card">
                🌾 <b>${p.name}</b><br>
                Category: ${p.category}<br>
                Qty: ${p.quantity}<br>
                Price: ₹${p.price}<br>
                Status: ${p.status}<br><br>

                <input id="in-${p.productId}" type="number" placeholder="Add quantity">
                <button onclick="stockIn(${p.productId})">➕ Stock In</button>

                <input id="out-${p.productId}" type="number" placeholder="Remove quantity">
                <button onclick="stockOut(${p.productId})">➖ Stock Out</button>

                </div>`;
            });

            document.getElementById("products").innerHTML = html;
        });
    }

    // ✅ PATCH: userId added to record transaction
    function stockIn(id){

        const qty = document.getElementById("in-"+id).value;

        if(!qty){
            alert("Enter quantity");
            return;
        }

        const userId = localStorage.getItem("userId");

        fetch(`/products/stock-in?productId=${id}&quantity=${qty}&userId=${userId}`,{
            method:'POST'
        })
        .then(res=>res.text())
        .then(msg=>{
            alert(msg);
            loadProducts();
        });
    }

    // ✅ PATCH: userId added to record transaction
    function stockOut(id){

        const qty = document.getElementById("out-"+id).value;

        if(!qty){
            alert("Enter quantity");
            return;
        }

        const userId = localStorage.getItem("userId");

        fetch(`/products/stock-out?productId=${id}&quantity=${qty}&userId=${userId}`,{
            method:'POST'
        })
        .then(res=>res.text())
        .then(msg=>{
            alert(msg);
            loadProducts();
        });
    }

    window.onload = loadProducts;

</script>

</body>
</html>
