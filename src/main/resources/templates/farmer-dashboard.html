<!DOCTYPE html>
<html>
<head>
<title>Farmer Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<style>
body{background:#020617;color:white;font-family:Inter;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#111;padding:15px;border-radius:10px;}
input,select,button{width:100%;margin-top:8px;padding:8px;border-radius:6px;border:none;}
button{background:#22c55e;color:white;}
</style>
</head>

<body>

<h2>🌾 Farmer Dashboard</h2>

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<select id="category">
<option>Vegetables</option>
<option>Fruits</option>
</select>

<input id="quantity" type="number" placeholder="Quantity">
<input id="unit" placeholder="Unit">
<input id="price" type="number" placeholder="Price">
<input id="expiry" type="date">
<input id="minStock" type="number" placeholder="Min Stock Level">

<button onclick="addProduct()">Add Product</button>

<h3>My Products</h3>
<div id="products" class="grid"></div>

<script>

function addProduct(){
fetch('/products/add',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:name.value,
category:category.value,
quantity:quantity.value,
unit:unit.value,
price:price.value,
expiryDate:expiry.value,
farmerId:1,
minStockLevel:minStock.value || 10
})
})
.then(res=>res.text())
.then(alert);
}

function load(){
fetch('/products/farmer?farmerId=1')
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`<div class="card">${p.name} - ${p.quantity}</div>`;
});
document.getElementById("products").innerHTML=html;
});
}

window.onload=load;

</script>

</body>
</html>
