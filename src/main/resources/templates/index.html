<!DOCTYPE html>
<html>
<head>
    <title>Agri Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            color: white;
        }

        /* 🔥 Warehouse Grid Background */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Glow light in background */
        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34,197,94,0.12), transparent 70%);
            filter: blur(120px);
            top: 20%;
            left: 20%;
        }

        /* Glass Card */
        .card {
            width: 340px;
            padding: 35px;
            border-radius: 18px;

            background: linear-gradient(
                145deg,
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.02)
            );

            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 25px 70px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.08);

            position: relative;
            z-index: 2;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;

            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);

            color: white;
            outline: none;
            transition: 0.25s;
        }

        input::placeholder {
            color: #64748b;
        }

        input:hover {
            border-color: rgba(34,197,94,0.4);
        }

        input:focus {
            border-color: rgba(34,197,94,0.7);
            box-shadow: 0 0 20px rgba(34,197,94,0.2);
        }

        /* Glow Hover Effect */
        .glow-hover {
            position: relative;
            overflow: hidden;
        }

        .glow-hover::before {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(34,197,94,0.25), transparent 70%);
            top: var(--y, 50%);
            left: var(--x, 50%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .glow-hover:hover::before {
            opacity: 1;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;

            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;

            box-shadow: 0 10px 25px rgba(34,197,94,0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(34,197,94,0.35);
        }

        /* Links */
        a {
            display: block;
            margin-top: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
        }

        a:hover {
            color: white;
        }

    </style>
</head>

<body>

<div class="card">
    <h2>🌱 Login</h2>

    <input class="glow-hover" type="email" id="email" placeholder="Email">
    <input class="glow-hover" type="password" id="password" placeholder="Password">

    <button class="glow-hover" onclick="login()">Login</button>

    <a href="/farmer">Farmer Register</a>
    <a href="/buyer">Buyer Register</a>
    <a href="/forgot-password">Forgot Password?</a>
</div>

<script>
/* Hover glow tracking */
document.querySelectorAll('.glow-hover').forEach(el => {
    el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        el.style.setProperty('--x', (e.clientX - rect.left) + 'px');
        el.style.setProperty('--y', (e.clientY - rect.top) + 'px');
    });
});

/* Existing login logic */
function login() {
    fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => {
        if (!res.ok) {
            return res.text().then(msg => { throw new Error(msg); });
        }
        return res.json();
    })
    .then(data => {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);

        if (data.role === "ADMIN") {
            window.location.href = "/admin-dashboard";
        } 
        else if (data.role === "FARMER") {
            window.location.href = "/farmer-dashboard";
        } 
        else {
            window.location.href = "/buyer-dashboard";
        }
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
