<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Registration</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            color: white;
        }

        /* 🔥 Warehouse grid */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 🔥 Soft glow (slightly warm for farmer identity) */
        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245,158,11,0.12), transparent 70%);
            filter: blur(120px);
            top: 20%;
            right: 20%;
        }

        /* Glass Card */
        .card {
            width: 360px;
            padding: 35px;
            border-radius: 18px;

            background: linear-gradient(
                145deg,
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.02)
            );

            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 25px 70px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.08);

            position: relative;
            z-index: 2;
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;

            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);

            color: white;
            outline: none;
            transition: 0.25s;
        }

        input::placeholder {
            color: #64748b;
        }

        input:hover {
            border-color: rgba(245,158,11,0.4);
        }

        input:focus {
            border-color: rgba(245,158,11,0.7);
            box-shadow: 0 0 20px rgba(245,158,11,0.2);
        }

        /* Glow Hover */
        .glow-hover {
            position: relative;
            overflow: hidden;
        }

        .glow-hover::before {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(245,158,11,0.25), transparent 70%);
            top: var(--y, 50%);
            left: var(--x, 50%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .glow-hover:hover::before {
            opacity: 1;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;

            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;

            box-shadow: 0 10px 25px rgba(245,158,11,0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(245,158,11,0.35);
        }

        /* Links */
        .links {
            margin-top: 15px;
            font-size: 13px;
        }

        .links a {
            color: #94a3b8;
            text-decoration: none;
        }

        .links a:hover {
            color: white;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>🌾 Create Farmer Account</h2>

    <input class="glow-hover" id="name" placeholder="Full Name">
    <input class="glow-hover" id="email" placeholder="Email Address">
    <input class="glow-hover" id="password" type="password" placeholder="Password">

    <button class="glow-hover" onclick="register()">Submit Request</button>

    <div class="links">
        <p>Already registered? <a href="/">Login</a></p>
    </div>

</div>

<script>
/* Glow tracking */
document.querySelectorAll('.glow-hover').forEach(el => {
    el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        el.style.setProperty('--x', (e.clientX - rect.left) + 'px');
        el.style.setProperty('--y', (e.clientY - rect.top) + 'px');
    });
});

/* Logic unchanged */
function register() {
    fetch('/auth/farmer/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        window.location.href = "/";
    });
}
</script>

</body>
</html>
