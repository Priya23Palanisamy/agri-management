<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1b5e20, #66bb6a);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #2e7d32;
        }

        p {
            font-size: 14px;
            color: gray;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1b5e20;
        }

        .step {
            display: none;
        }

        .active {
            display: block;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #ccc;
            line-height: 25px;
            color: white;
            font-size: 12px;
        }

        .circle.active {
            background: #2e7d32;
        }

        .back {
            margin-top: 10px;
            display: block;
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
        }

        @media(max-width: 400px) {
            .card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🔐 Reset Password</h2>
    <p>Secure your account with OTP verification</p>

    <!-- Progress -->
    <div class="progress">
        <div id="c1" class="circle active">1</div>
        <div id="c2" class="circle">2</div>
    </div>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
        <input id="email" placeholder="Enter your email">
        <button onclick="sendOtp()">Send OTP</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">
        <input id="otp" placeholder="Enter OTP">
        <input id="newPassword" type="password" placeholder="New Password">
        <button onclick="resetPassword()">Reset Password</button>
    </div>

    <a href="/" class="back">⬅ Back to Login</a>

</div>

<script>

function sendOtp() {
    fetch('/auth/forgot-password?email=' + email.value, {
        method: 'POST'
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);

        // move to step 2
        document.getElementById("step1").classList.remove("active");
        document.getElementById("step2").classList.add("active");

        document.getElementById("c2").classList.add("active");
    })
    .catch(() => alert("Error sending OTP"));
}

function resetPassword() {
    fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: email.value,
            otp: otp.value,
            newPassword: newPassword.value
        })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        window.location.href = "/";
    })
    .catch(() => alert("Reset failed"));
}

</script>

</body>
</html>
