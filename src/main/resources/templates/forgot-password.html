<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            color: white;
        }

        /* 🔥 Warehouse grid */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 🔥 Soft glow */
        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34,197,94,0.12), transparent 70%);
            filter: blur(120px);
            top: 20%;
            left: 20%;
        }

        /* Glass Card */
        .card {
            width: 360px;
            padding: 35px;
            border-radius: 18px;

            background: linear-gradient(
                145deg,
                rgba(255,255,255,0.06),
                rgba(255,255,255,0.02)
            );

            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 25px 70px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.08);

            position: relative;
            z-index: 2;
            text-align: center;
        }

        h2 {
            margin-bottom: 8px;
            font-weight: 600;
        }

        p {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        /* Progress */
        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            line-height: 28px;
            font-size: 12px;
        }

        .circle.active {
            background: rgba(34,197,94,0.8);
        }

        .step {
            display: none;
            animation: fade 0.3s ease;
        }

        .active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;

            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);

            color: white;
            outline: none;
            transition: 0.25s;
        }

        input::placeholder {
            color: #64748b;
        }

        input:hover {
            border-color: rgba(34,197,94,0.4);
        }

        input:focus {
            border-color: rgba(34,197,94,0.7);
            box-shadow: 0 0 20px rgba(34,197,94,0.2);
        }

        /* Glow hover */
        .glow-hover {
            position: relative;
            overflow: hidden;
        }

        .glow-hover::before {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(34,197,94,0.25), transparent 70%);
            top: var(--y, 50%);
            left: var(--x, 50%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .glow-hover:hover::before {
            opacity: 1;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;

            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;

            box-shadow: 0 10px 25px rgba(34,197,94,0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(34,197,94,0.35);
        }

        /* Back link */
        .back {
            display: block;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
        }

        .back:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🔐 Reset Password</h2>
    <p>Secure your account</p>

    <div class="progress">
        <div id="c1" class="circle active">1</div>
        <div id="c2" class="circle">2</div>
    </div>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
        <input class="glow-hover" id="email" placeholder="Enter your email">
        <button class="glow-hover" onclick="sendOtp()">Send OTP</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">
        <input class="glow-hover" id="otp" placeholder="Enter OTP">
        <input class="glow-hover" id="newPassword" type="password" placeholder="New Password">
        <button class="glow-hover" onclick="resetPassword()">Reset Password</button>
    </div>

    <a href="/" class="back">⬅ Back to Login</a>

</div>

<script>
/* Hover glow tracking */
document.querySelectorAll('.glow-hover').forEach(el => {
    el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        el.style.setProperty('--x', (e.clientX - rect.left) + 'px');
        el.style.setProperty('--y', (e.clientY - rect.top) + 'px');
    });
});

/* Logic unchanged */
function sendOtp() {
    fetch('/auth/forgot-password?email=' + email.value, {
        method: 'POST'
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);

        step1.classList.remove("active");
        step2.classList.add("active");
        c2.classList.add("active");
    })
    .catch(() => alert("Error sending OTP"));
}

function resetPassword() {
    fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: email.value,
            otp: otp.value,
            newPassword: newPassword.value
        })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        window.location.href = "/";
    })
    .catch(() => alert("Reset failed"));
}
</script>

</body>
</html>
