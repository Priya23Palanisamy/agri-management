<!DOCTYPE html>
<html>
<head>
    <title>Buyer Dashboard</title>
    <style>
        body{background:#020617;color:white;font-family:Inter;padding:20px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
        .card{background:#111;padding:15px;border-radius:10px;}
        input,button{width:100%;margin-top:8px;padding:8px;}
        button{background:#22c55e;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>

<body>

<h2>🛒 Buyer Dashboard</h2>


<div id="products" class="grid"></div>

<script>

    const buyerId = localStorage.getItem("userId");

    if(!buyerId){
        alert("Please login first");
        window.location.href = "/";
    }

    function load(){
        fetch('/products/all')
        .then(res=>res.json())
        .then(data=>{
            let html="";
            data.forEach(p=>{
                html+=`
                <div class="card">
                ${p.name}<br>
                Qty: ${p.quantity}<br>
                Price: ₹${p.price}
                <input id="buy-${p.productId}" placeholder="Quantity">
                <button onclick="buy(${p.productId})">Buy</button>
                </div>`;
            });
            document.getElementById("products").innerHTML=html;
        });
    }

    // ✅ PATCH: userId added to record transaction
    function buy(id){
        const q = document.getElementById("buy-"+id).value;
        const userId = localStorage.getItem("userId");

        fetch(`/products/stock-out?productId=${id}&quantity=${q}&userId=${userId}`,{method:'POST'})
        .then(()=>load());
    }

    window.onload=load;

</script>

</body>
</html>
