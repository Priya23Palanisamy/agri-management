<!DOCTYPE html>
<html>
<head>
<title>Buyer Dashboard</title>
<style>
body{background:#020617;color:white;font-family:Inter;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#111;padding:15px;border-radius:10px;}
input,button{width:100%;margin-top:8px;padding:8px;}
button{background:#22c55e;color:white;}
</style>
</head>

<body>

<h2>🛒 Buyer Dashboard</h2>

<div id="products" class="grid"></div>

<script>

function load(){
fetch('/products/all')
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`
<div class="card">
${p.name}<br>
Qty:${p.quantity}

<input id="buy-${p.productId}">
<button onclick="buy(${p.productId})">Buy</button>
</div>`;
});
products.innerHTML=html;
});
}

function buy(id){
let q=document.getElementById("buy-"+id).value;
fetch(`/products/stock-out?productId=${id}&quantity=${q}`,{method:'POST'})
.then(()=>load());
}

window.onload=load;

</script>

</body>
</html>
